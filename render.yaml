services:
  - type: web
    name: dermiq-rag
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: COHERE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.8
      - key: HF_HUB_DISABLE_SYMLINKS_WARNING
        value: "1"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: OMP_NUM_THREADS
        value: "1"
